services:
  two-body-sim:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    entrypoint: ["python", "/app/two_body_sim.py"]
    command:
      - "--m1"
      - "5.972e24"
      - "--x1"
      - "0"
      - "--y1"
      - "0"
      - "--vx1"
      - "0"
      - "--vy1"
      - "0"
      - "--m2"
      - "7.342e22"
      - "--x2"
      - "3.844e8"
      - "--y2"
      - "0"
      - "--vx2"
      - "0"
      - "--vy2"
      - "1022"
      - "--time"
      - "2.36e6"
      - "--dt"
      - "600"
      - "--output-dir"
      - "/app"

  two-body-sim-config:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    entrypoint: ["python", "/app/two_body_sim.py"]
    command:
      - "--config"
      - "/app/earth_moon_config.json"

  batch-compare:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    entrypoint: ["python", "/app/batch_compare.py"]
    command:
      - "--batch-config"
      - "/app/batch_config_example.json"
      - "--output-dir"
      - "/app/batch_results"
